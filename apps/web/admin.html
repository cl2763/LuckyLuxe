<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Luxe Admin</title>
    <link rel="stylesheet" href="/web/styles.css">
  </head>
  <body>
    <main class="shell admin-shell">
      <header class="topbar">
        <a class="brand" href="/">
          <span class="brand-mark">LL</span>
          <span>
            <strong id="adminBrandTitle">Lucky Luxe Admin</strong>
            <small id="adminBrandSubtitle">Owner Console</small>
          </span>
        </a>
        <nav class="top-actions">
          <div class="admin-lang-toggle" aria-label="Language">
            <button class="toggle active" id="adminLangZh" type="button">中文</button>
            <button class="toggle" id="adminLangEn" type="button">EN</button>
          </div>
          <a class="ghost-link" id="customerAppLink" href="/">Customer App</a>
          <input class="token-input hidden" id="tokenInput" value="" aria-label="Owner token" placeholder="Owner token fallback">
          <button class="primary slim hidden" id="reloadButton" type="button">Reload</button>
        </nav>
      </header>

      <section class="admin-card owner-login-card" id="ownerLogin">
        <div>
          <p class="eyebrow" id="ownerAccessEyebrow">Owner Access</p>
          <h2 id="ownerLoginTitle">Owner Login</h2>
          <p class="subtle" id="ownerLoginText">Use your approved owner email. Admin data is hidden until login succeeds.</p>
        </div>
        <form class="auth-form owner-login-form" id="ownerLoginForm">
          <label>
            <span id="ownerEmailLabel">Email</span>
            <input name="email" type="email" autocomplete="username">
          </label>
          <label>
            <span id="ownerPasswordLabel">Password</span>
            <input name="password" type="password" autocomplete="current-password">
          </label>
          <button class="primary slim" id="ownerLoginButton" data-auth-action="login" type="submit">Login</button>
          <button class="ghost slim" id="ownerRegisterButton" data-auth-action="register" type="submit">Register Owner</button>
          <button class="ghost slim" id="ownerLogout" type="button">Log out</button>
        </form>
      </section>

      <section class="metric-grid hidden" id="metricGrid"></section>

      <section class="admin-layout hidden" id="adminLayout">
        <div class="admin-main">
          <div class="section-row">
            <h1 id="bookingsTitle">Bookings</h1>
            <span class="subtle" id="bookingsSubtitle">Live backend data</span>
          </div>
          <div class="admin-tabs">
            <button class="admin-tab active" id="todayTab" data-admin-view="today" type="button">Today</button>
            <button class="admin-tab" id="allTab" data-admin-view="all" type="button">All Bookings</button>
            <button class="admin-tab" id="calendarTab" data-admin-view="calendar" type="button">Calendar</button>
          </div>
          <div class="filter-row" id="bookingFilters">
            <label>
              <span id="filterDateLabel">Date</span>
              <input id="filterDate" type="date">
            </label>
            <label>
              <span id="filterStatusLabel">Status</span>
              <select id="filterStatus">
                <option value="active">Active attention</option>
                <option value="all">All statuses</option>
                <option value="PENDING_PAYMENT">Pending payment</option>
                <option value="CONFIRMED">Confirmed</option>
                <option value="COMPLETED">Completed</option>
                <option value="CANCELLED">Cancelled</option>
                <option value="EXPIRED">Expired</option>
              </select>
            </label>
            <button class="ghost" id="clearFilters" type="button">Clear</button>
          </div>
          <div class="calendar-controls hidden" id="calendarControls">
            <button class="ghost" id="prevMonth" type="button">←</button>
            <strong id="calendarTitle"></strong>
            <button class="ghost" id="nextMonth" type="button">→</button>
          </div>
          <div class="admin-list" id="bookingList"></div>
        </div>

        <aside class="admin-side">
          <section class="admin-card">
            <h2 id="scheduleTitle">Technician Schedule</h2>
            <label>
              <span id="scheduleTechLabel">Technician</span>
              <select id="scheduleTech"></select>
            </label>
            <label>
              <span id="scheduleDateLabel">Date</span>
              <input id="scheduleDate" type="date">
            </label>
            <div class="form-grid tight">
              <label>
                <span id="scheduleStartLabel">Start</span>
                <input id="scheduleStart" value="10:00">
              </label>
              <label>
                <span id="scheduleEndLabel">End</span>
                <input id="scheduleEnd" value="19:00">
              </label>
            </div>
            <label class="check-row">
              <input id="scheduleWorking" type="checkbox" checked>
              <span id="scheduleWorkingLabel">Working day</span>
            </label>
            <button class="primary full" id="saveSchedule" type="button">Save Schedule</button>
          </section>

          <section class="admin-card">
            <div class="section-row compact-row">
              <h2 id="servicesTitle">Services</h2>
              <button class="primary slim" id="addServiceButton" type="button">Add Service</button>
            </div>
            <div id="serviceEditor"></div>
            <div class="service-admin-list" id="serviceAdminList"></div>
          </section>
        </aside>
      </section>
    </main>

    <div class="toast" id="toast"></div>
    <script src="/web/admin.js"></script>
  </body>
</html>
